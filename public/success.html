<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful | ARSI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      position:relative;

      padding:20px;

      background:
      radial-gradient(circle at top left,rgba(212,175,55,0.08),transparent 30%),
      radial-gradient(circle at bottom right,rgba(201,161,90,0.08),transparent 30%),
      linear-gradient(135deg,#0f0d09,#17130d,#0c0b09);
    }

    .gold-glow{

      position:absolute;

      width:520px;
      height:520px;

      border-radius:50%;

      background:rgba(212,175,55,0.10);

      filter:blur(130px);

      animation:floatGlow 7s ease-in-out infinite alternate;
    }

    @keyframes floatGlow{

      from{
        transform:scale(1);
        opacity:0.6;
      }

      to{
        transform:scale(1.15);
        opacity:1;
      }
    }

    .success-card{

      position:relative;
      z-index:2;

      width:100%;
      max-width:560px;

      padding:58px 42px;

      text-align:center;

      border-radius:34px;

      background:rgba(255,255,255,0.05);

      backdrop-filter:blur(22px);

      border:1px solid rgba(212,175,55,0.18);

      box-shadow:
      0 25px 70px rgba(0,0,0,0.65),
      0 0 35px rgba(212,175,55,0.08);

      animation:fadeUp .8s ease;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .success-icon{

      width:110px;
      height:110px;

      margin:0 auto 26px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:48px;
      font-weight:700;

      color:#f3d089;

      background:
      linear-gradient(145deg,#2a2115,#17120c);

      border:1px solid rgba(212,175,55,0.24);

      box-shadow:
      inset 0 2px 12px rgba(255,255,255,0.06),
      0 12px 30px rgba(212,175,55,0.16);
    }

    .status-badge{

      display:inline-block;

      padding:10px 18px;

      border-radius:999px;

      background:rgba(212,175,55,0.08);

      border:1px solid rgba(212,175,55,0.18);

      color:#e9c67a;

      font-size:.82rem;
      font-weight:600;

      letter-spacing:.5px;

      margin-bottom:22px;
    }

    h1{

      font-size:2.4rem;
      font-weight:700;

      color:#ffffff;

      margin-bottom:18px;

      letter-spacing:-0.5px;
    }

    .description{

      color:#d4d4d4;

      font-size:1rem;

      line-height:1.9;

      margin-bottom:40px;
    }

    .buttons{

      display:flex;
      justify-content:center;

      gap:16px;

      flex-wrap:wrap;
    }

    .home-btn,
    .orders-btn{

      padding:15px 32px;

      border-radius:16px;

      border:none;

      cursor:pointer;

      font-size:15px;
      font-weight:600;

      transition:all .35s ease;
    }

    .home-btn{

      color:#111;

      background:
      linear-gradient(135deg,#f5d189,#c99842);

      box-shadow:
      0 12px 24px rgba(212,175,55,0.22);
    }

    .home-btn:hover{

      transform:translateY(-4px);

      box-shadow:
      0 20px 35px rgba(212,175,55,0.32);
    }

    .orders-btn{

      color:#f3d089;

      background:rgba(255,255,255,0.03);

      border:1px solid rgba(212,175,55,0.18);
    }

    .orders-btn:hover{

      transform:translateY(-4px);

      background:rgba(212,175,55,0.08);
    }

    .footer-note{

      margin-top:36px;

      font-size:.92rem;

      color:#9f9f9f;
    }

    @media(max-width:600px){

      .success-card{
        padding:44px 24px;
      }

      h1{
        font-size:2rem;
      }

      .buttons{
        flex-direction:column;
      }

      .home-btn,
      .orders-btn{
        width:100%;
      }
    }

  </style>
</head>

<body>

  <div class="gold-glow"></div>

  <div class="success-card">

    <div class="success-icon">✓</div>

    <div class="status-badge">
      PAYMENT SUCCESSFUL
    </div>

    <h1>Order Confirmed</h1>

    <p class="description">
      Your payment has been successfully processed.
      Your order is now confirmed and being prepared for dispatch.
      Thank you for shopping with ARSI.
    </p>

    <div class="buttons">

      <button class="home-btn"
        onclick="window.location.href='/'">
        Return Home
      </button>

      <button class="orders-btn"
        onclick="window.location.href='/orders.html'">
        View Orders
      </button>

    </div>

    <div class="footer-note">
      ARSI Premium Shopping Experience
    </div>

  </div>
  <script>

  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  if(cart.length > 0){

    const existingOrders =
      JSON.parse(localStorage.getItem("orders")) || [];

    existingOrders.push(...cart);

    localStorage.setItem(
      "orders",
      JSON.stringify(existingOrders)
    );

    localStorage.removeItem("cart");
  }

</script>

</body>
</html>
