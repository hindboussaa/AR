<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled | ARSI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
      padding:20px;

      background:
      radial-gradient(circle at top left,#d6b77a22,transparent 30%),
      radial-gradient(circle at bottom right,#caa25c22,transparent 30%),
      linear-gradient(135deg,#0f0f10,#1a1a1d,#111112);
    }

    .gold-glow{
      position:absolute;
      width:550px;
      height:550px;
      border-radius:50%;

      background:rgba(201,161,90,0.18);

      filter:blur(120px);

      animation:floatGlow 6s ease-in-out infinite alternate;
    }

    @keyframes floatGlow{
      from{
        transform:scale(1) translateY(0);
        opacity:0.65;
      }
      to{
        transform:scale(1.15) translateY(-20px);
        opacity:1;
      }
    }

    .cancel-card{

      position:relative;
      z-index:2;

      width:100%;
      max-width:560px;

      padding:55px 42px;

      border-radius:32px;

      background:rgba(255,255,255,0.06);

      backdrop-filter:blur(20px);

      border:1px solid rgba(212,175,55,0.22);

      box-shadow:
      0 20px 60px rgba(0,0,0,0.55),
      0 0 30px rgba(212,175,55,0.08);

      text-align:center;

      animation:fadeUp .7s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .cancel-icon{

      width:105px;
      height:105px;

      margin:0 auto 24px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:46px;
      font-weight:700;

      color:#f3d089;

      background:
      linear-gradient(145deg,#2a2418,#16130e);

      border:1px solid rgba(212,175,55,0.28);

      box-shadow:
      inset 0 2px 10px rgba(255,255,255,0.08),
      0 12px 30px rgba(212,175,55,0.18);
    }

    .status-badge{

      display:inline-block;

      padding:10px 18px;

      border-radius:999px;

      background:rgba(212,175,55,0.12);

      border:1px solid rgba(212,175,55,0.25);

      color:#e7c37b;

      font-size:.82rem;
      font-weight:600;
      letter-spacing:.4px;

      margin-bottom:20px;
    }

    h1{
      font-size:2.3rem;
      font-weight:700;
      color:#ffffff;
      margin-bottom:18px;
    }

    .description{
      color:#d8d8d8;
      font-size:1rem;
      line-height:1.9;
      margin-bottom:38px;
    }

    .action-buttons{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .primary-btn{

      text-decoration:none;

      padding:15px 30px;

      border-radius:16px;

      font-weight:600;

      color:#111;

      background:
      linear-gradient(135deg,#f6d38a,#c89b49);

      transition:.35s ease;

      box-shadow:
      0 10px 24px rgba(212,175,55,0.25);
    }

    .primary-btn:hover{
      transform:translateY(-4px);

      box-shadow:
      0 18px 34px rgba(212,175,55,0.35);
    }

    .secondary-btn{

      text-decoration:none;

      padding:15px 30px;

      border-radius:16px;

      font-weight:600;

      color:#f3d089;

      background:rgba(255,255,255,0.04);

      border:1px solid rgba(212,175,55,0.2);

      transition:.35s ease;
    }

    .secondary-btn:hover{
      transform:translateY(-4px);

      background:rgba(212,175,55,0.08);
    }

    .footer-note{
      margin-top:34px;
      font-size:.92rem;
      color:#b8b8b8;
    }

    @media(max-width:600px){

      .cancel-card{
        padding:42px 24px;
      }

      h1{
        font-size:1.9rem;
      }

      .action-buttons{
        flex-direction:column;
      }

      .primary-btn,
      .secondary-btn{
        width:100%;
      }
    }

  </style>
</head>

<body>

  <div class="gold-glow"></div>

  <div class="cancel-card">

    <div class="cancel-icon">✕</div>

    <div class="status-badge">
      Transaction Cancelled
    </div>

    <h1>Payment Was Not Completed</h1>

    <p class="description">
      Your checkout process was cancelled before completion.
      No payment has been charged to your account.
      You can safely continue shopping and retry your order at any time.
    </p>

    <div class="action-buttons">

      <a href="/" class="primary-btn">
        Return Home
      </a>

      <a href="/#products" class="secondary-btn">
        Continue Shopping
      </a>

    </div>

    <div class="footer-note">
      ARSI Premium Shopping Experience
    </div>

  </div>

</body>
</html>
