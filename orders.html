<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Orders</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#eef3fb;
      min-height:100vh;
      padding:40px 20px;
      color:#111827;
    }

    .orders-container{
      max-width:900px;
      margin:auto;
    }

    .orders-title{
      text-align:center;
      font-size:42px;
      margin-bottom:40px;
      font-weight:700;
    }

    .empty-orders{
      background:white;
      padding:40px;
      text-align:center;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      color:#6b7280;
      font-size:18px;
    }

    .order-card{
      background:white;
      border-radius:24px;
      padding:25px;
      margin-bottom:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;

      transition:0.3s;
    }

    .order-card:hover{
      transform:translateY(-4px);
    }

    .order-left{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .order-image{
      width:90px;
      height:90px;
      border-radius:18px;
      object-fit:cover;
      background:#f3f4f6;
    }

    .order-info h3{
      font-size:22px;
      margin-bottom:8px;
    }

    .order-info p{
      color:#6b7280;
      margin-bottom:4px;
    }

    .order-price{
      font-size:24px;
      font-weight:700;
      color:#2563eb;
    }

    .back-home{
      display:flex;
      justify-content:center;
      margin-top:40px;
    }

    .back-home a{
      background:#2563eb;
      color:white;
      text-decoration:none;
      padding:14px 34px;
      border-radius:14px;
      font-weight:600;
      transition:0.3s;
    }

    .back-home a:hover{
      background:#1d4ed8;
    }

    @media(max-width:768px){

      .order-card{
        flex-direction:column;
        align-items:flex-start;
      }

      .order-left{
        flex-direction:column;
        align-items:flex-start;
      }

      .order-image{
        width:100%;
        height:220px;
      }

    }

  </style>
</head>
<body>

  <div class="orders-container">

    <h1 class="orders-title">Your Orders</h1>

    <div id="orders-list"></div>

    <div class="back-home">
      <a href="index.html">Return Home</a>
    </div>

  </div>

  <script>

    const orders = JSON.parse(localStorage.getItem("orders")) || [];

    const ordersList = document.getElementById("orders-list");

    if(orders.length === 0){

      ordersList.innerHTML = `
        <div class="empty-orders">
          No orders found.
        </div>
      `;

    } else {

      orders.forEach(order => {

        ordersList.innerHTML += `

          <div class="order-card">

            <div class="order-left">

              <img 
                src="${order.image}" 
                alt="${order.name}" 
                class="order-image"
              >

              <div class="order-info">

                <h3>${order.name}</h3>

                <p>Luxury Arabic Fragrance</p>

                <p>Quantity: ${order.quantity || 1}</p>

              </div>

            </div>

            <div class="order-price">
              £${order.price}
            </div>

          </div>

        `;

      });

    }

  </script>

</body>
</html>
